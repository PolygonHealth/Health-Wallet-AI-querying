version: "3.9"

services:
  ai-query-engine:
    build: .
    container_name: polygon-health-ai-query-engine
    env_file:
      - .env
    ports:
      - "8000:8000"

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: user@domain.com
      PGADMIN_DEFAULT_PASSWORD: admin

